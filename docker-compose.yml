services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wri
      POSTGRES_USER: wri
      POSTGRES_PASSWORD: wri123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wri -d wri"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://wri:wri123@db:5432/wri   # SQLAlchemy
      DATABASE_DSN: postgresql://wri:wri123@db:5432/wri          # psycopg
      PYTHONPATH: /app
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata: